query TopRatedBooks($take: Int = 5) {
  topRatedBooks(take: $take) {
    bookId
    title
    averageRating
    reviewCount
  }
}

query StoreStats {
  storeStats {
    bookCount
    authorCount
    customerCount
    orderCount
    inventoryValue
  }
}

