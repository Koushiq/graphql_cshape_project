# Open http://localhost:5000/graphql and paste any operation below.
# For paged queries, use the `endCursor` from `pageInfo` as the next `after` variable.

query BooksPage($first: Int = 10, $after: String) {
  books(first: $first, after: $after) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    nodes {
      id
      title
      isbn
      description
      price
      stock
      publishedOn
      author {
        id
        name
      }
      publisher {
        id
        name
        country
      }
      reviews {
        id
        rating
        comment
        createdAtUtc
      }
    }
  }
}

query BookById($id: Int!) {
  bookById(id: $id) {
    id
    title
    isbn
    description
    price
    stock
    publishedOn
    author {
      id
      name
      bio
    }
    publisher {
      id
      name
      country
    }
    bookCategories {
      category {
        id
        name
      }
    }
    reviews {
      id
      rating
      comment
      customer {
        id
        fullName
      }
    }
  }
}

query SearchBooks($term: String!, $first: Int = 10, $after: String) {
  searchBooks(term: $term, first: $first, after: $after) {
    totalCount
    pageInfo {
      hasNextPage
      endCursor
    }
    nodes {
      id
      title
      isbn
      price
      author {
        name
      }
    }
  }
}

