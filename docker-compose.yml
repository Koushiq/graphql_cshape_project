services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphql-bookstore-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=graphql_bookstore;Username=postgres;Password=postgres
      Database__ApplyMigrationsOnStartup: true
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: graphql-bookstore-postgres
    environment:
      POSTGRES_DB: graphql_bookstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d graphql_bookstore"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
